[general]
live_config_reload = true

[cursor]
blink_interval = 600
unfocused_hollow = true

[cursor.style]
blinking = "Always"

[env]
TERM = "alacritty"

[font]
size = 16

[font.bold]
family = "UbuntuMono"
style = "Bold"

[font.bold_italic]
family = "UbuntuMono"
style = "Bold Italic"

[font.italic]
family = "UbuntuMono"
style = "Italic"

[font.normal]
family = "UbuntuMono"
style = "Regular"

[hints]
alphabet = "jfkdls;ahgurieowpq"

[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
post_processing = true
persist = false
regex = "(https?://|file://|mailto:)[^\\x00-\\x1f\\x7f-\\x9f<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.binding]
key = "U"
mods = "Control|Shift"

[hints.enabled.mouse]
enabled = true
mods = "None"

[keyboard]
bindings = [
    { action = "Paste", key = "V", mods = "Control|Shift" },
    { action = "Copy", key = "C", mods = "Control|Shift" },
    { action = "ResetFontSize", key = "Key0", mods = "Control" },
    { action = "IncreaseFontSize", key = "Plus", mods = "Control" },
    { action = "DecreaseFontSize", key = "Minus", mods = "Control" },
    { action = "ScrollPageDown", key = "K", mods = "Control|Shift" },
    { action = "ScrollPageUp", key = "L", mods = "Control|Shift" },
    { action = "ToggleViMode", key = "Space", mods = "Alt" },
    { action = "ToggleViMode", key = "G", mode = "Vi|~Search" },
    { action = "ToggleViMode", key = "Escape", mode = "Vi|~Search" },
    { action = "Left", key = "U", mode = "Vi|~Search" },
    { action = "Down", key = "I", mode = "Vi|~Search" },
    { action = "Up", key = "O", mode = "Vi|~Search" },
    { action = "Right", key = "P", mode = "Vi|~Search" },
    { action = "SemanticLeft", key = "J", mode = "Vi|~Search" },
    { action = "SemanticRight", key = ";", mode = "Vi|~Search" },
    { action = "ScrollHalfPageDown", key = "K", mode = "Vi|~Search" },
    { action = "ScrollHalfPageUp", key = "L", mode = "Vi|~Search" },
    { action = "FirstOccupied", key = "H", mode = "Vi|~Search" },
    { action = "Last", key = "'", mode = "Vi|~Search" },
    { action = "First", key = ",", mods = "Shift", mode = "Vi|~Search" },
    { action = "Last", key = ".", mods = "Shift", mode = "Vi|~Search" },
    { action = "ToggleNormalSelection", key = "Space", mode = "Vi|~Search" },
    { action = "ToggleSemanticSelection", key = "V", mods = "Alt", mode = "Vi|~Search" },
    { action = "ToggleSemanticSelection", key = "S", mods = "Alt", mode = "Vi|~Search" },
    { action = "ToggleLineSelection", key = "V", mods = "Shift", mode = "Vi|~Search" },
    { action = "ToggleBlockSelection", key = "V", mods = "Control", mode = "Vi|~Search" },
    { action = "Copy", key = "C", mode = "Vi|~Search" },
    { action = "Copy", key = "Y", mode = "Vi|~Search" },
    { action = "SearchForward", key = "S", mode = "Vi|~Search" },
    { action = "SearchForward", key = "/", mode = "Vi|~Search" },
    { action = "SearchBackward", key = "/", mods = "Shift", mode = "Vi|~Search" },
    { action = "SearchNext", key = "N", mode = "Vi|~Search" },
    { action = "SearchPrevious", key = "N", mods = "Shift", mode = "Vi|~Search" },
    { action = "CenterAroundViCursor", key = "M", mode = "Vi|~Search" },
]

[mouse]
bindings = [
    { action = "PasteSelection", mouse = "Middle" },
    { action = "CopySelection", mouse = "Right" },
]

[scrolling]
history = 100000

[window]
decorations_theme_variant = "Dark"
title = "Alacritty"

[window.class]
general = "Alacritty"
instance = "Alacritty"

[window.padding]
x = 1
y = 1

[colors.primary]
background = "#fbf1c7"
foreground = "#3c3836"

[colors.normal]
black = "#fbf1c7"
red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
magenta = "#b16286"
cyan = "#689d6a"
white = "#7c6f64"

[colors.bright]
black = "#928374"
red = "#9d0006"
green = "#79740e"
yellow = "#b57614"
blue = "#076678"
magenta = "#8f3f71"
cyan = "#427b58"
white = "#3c3836"
